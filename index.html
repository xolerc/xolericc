<h2 class="sr-only">Nima yeyish kerakligini tanlash uchun interaktiv g'ildirak</h2>
<div style="text-align:center; padding: 1rem 0;">
  <div id="wheel-label" style="font-size:24px; font-weight:500; margin-bottom: 1rem; min-height: 32px;">Tugmani bosing</div>
  <button id="spin-btn" style="padding: 10px 24px; font-size: 15px;"><i class="ti ti-refresh" style="font-size:16px; vertical-align:-3px; margin-right:6px" aria-hidden="true"></i>Aylantir</button>

  <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top: 1.5rem;">
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Lag'mon</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Osh</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Manti</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Shashlik</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Pitsa</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Somsa</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Burger</span>
    <span class="tag" style="font-size:12px; padding:4px 10px; border-radius: var(--radius); background: var(--surface-1); color: var(--text-secondary);">Sushi</span>
  </div>

  <div id="cta" style="margin-top: 1.5rem; display:none;">
    <button id="recipe-btn" style="padding: 8px 18px; font-size: 14px;">Retseptini ko'rsat ↗</button>
  </div>
</div>
<script>
const dishes = ["Lag'mon","Osh","Manti","Shashlik","Pitsa","Somsa","Burger","Sushi","Norin","Chuchvara","Dimlama","Shorva"];
const label = document.getElementById('wheel-label');
const btn = document.getElementById('spin-btn');
const cta = document.getElementById('cta');
const recipeBtn = document.getElementById('recipe-btn');
let chosen = null;
btn.addEventListener('click', () => {
  cta.style.display = 'none';
  let count = 0;
  const spin = setInterval(() => {
    label.textContent = dishes[Math.floor(Math.random()*dishes.length)];
    count++;
    if (count > 15) {
      clearInterval(spin);
      chosen = dishes[Math.floor(Math.random()*dishes.length)];
      label.textContent = chosen;
      cta.style.display = 'block';
    }
  }, 80);
});
recipeBtn.addEventListener('click', () => {
  if (chosen) sendPrompt(chosen + ' retseptini bergin');
});
</script>
